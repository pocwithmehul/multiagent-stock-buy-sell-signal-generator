# ── Volume configuration ───────────────────────────────────────────────────────
# Default: named Docker volumes (Docker-managed, no host path required).
#
# Custom host path: set the per-service volume env vars to absolute paths.
# Docker Compose treats absolute paths as bind mounts automatically.
#
# Quickest way — use the helper script:
#   ./scripts/start.sh --data-path /your/custom/path
#
# Or export manually and start:
#   export DATA_PATH=/your/custom/path
#   export POSTGRES_VOLUME=$DATA_PATH/postgres
#   export KAFKA_VOLUME=$DATA_PATH/kafka
#   export QDRANT_VOLUME=$DATA_PATH/qdrant
#   export ZOOKEEPER_DATA_VOLUME=$DATA_PATH/zookeeper/data
#   export ZOOKEEPER_LOG_VOLUME=$DATA_PATH/zookeeper/log
#   mkdir -p $POSTGRES_VOLUME $KAFKA_VOLUME $QDRANT_VOLUME $ZOOKEEPER_DATA_VOLUME $ZOOKEEPER_LOG_VOLUME
#   docker compose up -d
# ──────────────────────────────────────────────────────────────────────────────

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - ${ZOOKEEPER_DATA_VOLUME:-zookeeper-data}:/var/lib/zookeeper/data
      - ${ZOOKEEPER_LOG_VOLUME:-zookeeper-log}:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://0.0.0.0:29092,PLAINTEXT_EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:29092,PLAINTEXT_EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - ${KAFKA_VOLUME:-kafka-data}:/var/lib/kafka/data

  qdrant:
    image: qdrant/qdrant:v1.16.1
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ${QDRANT_VOLUME:-qdrant-data}:/qdrant/storage

  neo4j:
    image: neo4j:5.18-community
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-neo4j_password}"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1G"
    volumes:
      - ${NEO4J_VOLUME:-neo4j-data}:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: stock_signal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ${POSTGRES_VOLUME:-postgres-data}:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8081:8080"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  infra-init:
    image: python:3.11-slim
    depends_on:
      - qdrant
      - kafka
      - unleash
    working_dir: /app
    volumes:
      - .:/app
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      UNLEASH_URL: http://unleash:4242
    command: >
      sh -c "pip install qdrant-client kafka-python --quiet &&
             python scripts/init_infrastructure.py"
    restart: on-failure

  # Unleash Feature Flag Server (local development only)
  unleash:
    image: unleashorg/unleash-server:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4242:4242"
    environment:
      DATABASE_URL: "postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/unleash"
      DATABASE_SSL: "false"
      INIT_ADMIN_API_TOKENS: "*:*.unleash-insecure-admin-api-token"
      INIT_CLIENT_API_TOKENS: "default:development.unleash-insecure-api-token"
      INIT_FRONTEND_API_TOKENS: "default:development.unleash-insecure-frontend-token"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4242/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  qdrant-data:
  postgres-data:
  neo4j-data:
